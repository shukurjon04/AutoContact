<div class="login-wrapper">
  <div class="particles-bg"></div>
  
  <div class="login-container animate-fade-in">
    <div class="glass-card login-card p-5">
      <div class="text-center mb-5">
        <div class="logo-circle mx-auto mb-3">
          <i class="bi bi-robot text-white fs-1"></i>
        </div>
        <h2 class="text-white font-weight-bold">SubBot Admin</h2>
        <p class="text-muted">Enter your credentials to access the dashboard</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group mb-4">
          <label class="text-muted small fw-bold mb-2 text-uppercase letter-spacing-1">Username</label>
          <div class="position-relative">
            <i class="bi bi-person position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
            <input 
              type="text" 
              class="form-control ps-5" 
              formControlName="username" 
              placeholder="admin"
              [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
          </div>
        </div>

        <div class="form-group mb-5">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="text-muted small fw-bold text-uppercase letter-spacing-1">Password</label>
          </div>
          <div class="position-relative">
            <i class="bi bi-lock position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              class="form-control ps-5 pe-5" 
              formControlName="password" 
              placeholder="••••••••"
              [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <i 
              class="bi position-absolute top-50 end-0 translate-middle-y me-3 text-muted cursor-pointer hover-white" 
              [class.bi-eye]="!showPassword" 
              [class.bi-eye-slash]="showPassword"
              (click)="togglePasswordVisibility()">
            </i>
          </div>
        </div>

        <button 
          type="submit" 
          class="btn btn-primary w-100 py-3 fw-bold d-flex justify-content-center align-items-center" 
          [disabled]="loginForm.invalid || isLoading">
          <span *ngIf="!isLoading">Sign In <i class="bi bi-arrow-right ms-2"></i></span>
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        </button>
      </form>
    </div>
  </div>
</div>
