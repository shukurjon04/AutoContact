version: "3.9"

services:
  postgres:
    environment:
      POSTGRES_DB: subscription_bot_db
      POSTGRES_USER: subscription_bot_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  django:
    build:
      context: .
      dockerfile: docker/Dockerfile.django
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: subscription_bot_db
      DB_USER: subscription_bot_user
      DB_PASSWORD: dev_password
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,django,0.0.0.0
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    command: celery -A config worker -l debug --concurrency=2
    environment:
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: subscription_bot_db
      DB_USER: subscription_bot_user
      DB_PASSWORD: dev_password
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - .:/app

  celery_beat:
    command: celery -A config beat -l debug --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: subscription_bot_db
      DB_USER: subscription_bot_user
      DB_PASSWORD: dev_password
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - .:/app

volumes:
  static_volume:
  media_volume:
