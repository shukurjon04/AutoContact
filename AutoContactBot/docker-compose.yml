version: "3.9"

# ==============================================================================
# SubBot - COMPLETE STACK (Frontend + Backend + Database)
# ONE COMMAND TO RUN EVERYTHING!
# ==============================================================================
# Usage:
#   docker compose up              # Start all services (foreground)
#   docker compose up -d           # Start in background
#   docker compose logs -f         # View all logs
#   docker compose down            # Stop all services
#   docker compose ps              # Service status
#
# First Time Setup:
#   docker compose up
#   docker compose exec django python manage.py migrate
#   docker compose exec django python manage.py createsuperuser
#
# Access Points:
#   🌐 Frontend:       http://localhost
#   📱 API Docs:       http://localhost/api/v1/
#   🔑 Admin Panel:    http://localhost/django-admin/
#   💚 Health:         http://localhost/health/
#
# Database Admin:
#   postgresql://localhost:5432
#   user: ${DB_USER:-subscription_bot_user}
#   pass: ${DB_PASSWORD:-dev_password}
# ==============================================================================

services:

  # ==========================================================================
  # LAYER 1: DATA PERSISTENCE
  # ==========================================================================

  postgres:
    image: postgres:16-alpine
    container_name: subbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-subscription_bot_db}
      POSTGRES_USER: ${DB_USER:-subscription_bot_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
    expose:
      - 5432
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - subbot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-subscription_bot_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: subbot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    expose:
      - 6379
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - subbot_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # LAYER 2: BACKEND SERVICES
  # ==========================================================================

  django:
    build:
      context: .
      dockerfile: docker/Dockerfile.django
    container_name: subbot_django
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn -b 0.0.0.0:8000 -w 4 --timeout 60 config.wsgi:application"
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,django}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}

      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-subscription_bot_db}
      DB_USER: ${DB_USER:-subscription_bot_user}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password}

      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
      WEBHOOK_HOST: ${WEBHOOK_HOST:-}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/bot/webhook}
      WEBHOOK_SECRET_TOKEN: ${WEBHOOK_SECRET_TOKEN:-}

      PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID:-}
      PAYME_SECRET_KEY: ${PAYME_SECRET_KEY:-}
      PAYME_TEST_MODE: ${PAYME_TEST_MODE:-True}

    expose:
      - 8000
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - django_logs_volume:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - subbot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.django
    container_name: subbot_celery_worker
    restart: unless-stopped
    command: celery -A config worker -l info
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-subscription_bot_db}
      DB_USER: ${DB_USER:-subscription_bot_user}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password}

      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1

    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    volumes:
      - django_logs_volume:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_healthy
    networks:
      - subbot_network

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.django
    container_name: subbot_celery_beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-subscription_bot_db}
      DB_USER: ${DB_USER:-subscription_bot_user}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password}

      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0

    healthcheck:
      disable: true

    volumes:
      - django_logs_volume:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_healthy
    networks:
      - subbot_network

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    container_name: subbot_bot
    restart: unless-stopped
    command: python -m bot.main
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      BOT_MODE: ${BOT_MODE:-webhook}

      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
      WEBHOOK_HOST: ${WEBHOOK_HOST:-}
      WEBHOOK_SECRET_TOKEN: ${WEBHOOK_SECRET_TOKEN:-}

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-subscription_bot_db}
      DB_USER: ${DB_USER:-subscription_bot_user}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password}

      REDIS_URL: redis://redis:6379/0
      PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID:-}
      PAYME_SECRET_KEY: ${PAYME_SECRET_KEY:-}

    volumes:
      - django_logs_volume:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_healthy
    networks:
      - subbot_network

  # ==========================================================================
  # LAYER 3: FRONTEND (Angular + Nginx)
  # ==========================================================================

  frontend:
    build:
      context: ../AutoContactBot-Frontend
      dockerfile: Dockerfile
    container_name: subbot_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
      - nginx_logs_volume:/var/log/nginx:rw
    depends_on:
      django:
        condition: service_healthy
    networks:
      - subbot_network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider --no-check-certificate https://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      NGINX_HOST: ${DOMAIN:-localhost}
      NGINX_PORT: 80

  certbot:
    image: certbot/certbot
    container_name: subbot_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# =============================================================================
# PERSISTENT STORAGE
# =============================================================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  django_logs_volume:
    driver: local
  nginx_logs_volume:
    driver: local
  certbot_certs:
    driver: local
  certbot_webroot:
    driver: local

# =============================================================================
# NETWORKING
# =============================================================================

networks:
  subbot_network:
    driver: bridge
